name: Release Build

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      release_name:
        required: false
        type: string
        default: ""
      prerelease:
        required: false
        type: boolean
        default: false
      make_latest:
        required: false
        type: string
        default: "true"

permissions:
  contents: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_name: ${{ steps.meta.outputs.release_name }}
      is_nightly: ${{ steps.meta.outputs.is_nightly }}
      release_body: ${{ steps.meta.outputs.release_body }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 1

      - name: Derive metadata
        id: meta
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          set -euo pipefail

          tag="${INPUT_TAG}"

          if [[ "${tag}" == "nightly" ]]; then
            version="nightly"
            is_nightly="true"
            release_name="${INPUT_RELEASE_NAME:-Nightly}"

            commit_sha="$(git rev-parse HEAD)"
            commit_short="$(git rev-parse --short=12 HEAD)"
            commit_date="$(git show -s --date=iso-strict --format=%cd HEAD)"
            build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

            {
              echo 'release_body<<EOF'
              echo "Rolling nightly build from the latest main branch commit."
              echo
              echo "- Commit: ${commit_sha}"
              echo "- Short SHA: ${commit_short}"
              echo "- Commit date: ${commit_date}"
              echo "- Build date (UTC): ${build_date}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            version="${tag#v}"
            is_nightly="false"
            release_name="${INPUT_RELEASE_NAME:-Release ${tag}}"
            {
              echo 'release_body<<EOF'
              echo ""
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "is_nightly=${is_nightly}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ubuntu-latest
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact_name: server-x86_64-unknown-linux-musl
            build_kind: zigbuild
            profile: release
            flavor: server

          - target: aarch64-unknown-linux-musl
            artifact_name: server-aarch64-unknown-linux-musl
            build_kind: zigbuild
            profile: release
            flavor: server

          - target: x86_64-unknown-linux-musl
            artifact_name: router-x86_64-unknown-linux-musl
            build_kind: zigbuild
            profile: release
            flavor: router

          - target: aarch64-unknown-linux-musl
            artifact_name: router-aarch64-unknown-linux-musl
            build_kind: zigbuild
            profile: release-router
            flavor: router

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Show Zig version
        shell: bash
        run: zig version

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ matrix.build_kind == 'zigbuild' }}
        with:
          targets: ${{ matrix.target }}

      - uses: dtolnay/rust-toolchain@nightly
        if: ${{ matrix.build_kind == 'build-std' }}
        with:
          components: rust-src

      - uses: taiki-e/install-action@v2
        if: ${{ matrix.build_kind == 'zigbuild' }}
        with:
          tool: cargo-zigbuild

      - uses: Swatinem/rust-cache@v2

      - name: Create Zig MIPS toolchain wrappers
        if: ${{ matrix.build_kind == 'build-std' }}
        shell: bash
        run: |
          set -euo pipefail
          wrapper_dir="$RUNNER_TEMP/zig-cross"
          mkdir -p "$wrapper_dir"

          cat > "$wrapper_dir/${{ matrix.cc_prefix }}-gcc" <<EOF
          #!/usr/bin/env bash
          exec zig cc -target ${{ matrix.target }} "\$@"
          EOF

          cat > "$wrapper_dir/${{ matrix.cc_prefix }}-g++" <<EOF
          #!/usr/bin/env bash
          exec zig c++ -target ${{ matrix.target }} "\$@"
          EOF

          cat > "$wrapper_dir/${{ matrix.cc_prefix }}-ar" <<'EOF'
          #!/usr/bin/env bash
          exec zig ar "$@"
          EOF

          cat > "$wrapper_dir/${{ matrix.cc_prefix }}-ranlib" <<'EOF'
          #!/usr/bin/env bash
          exec zig ranlib "$@"
          EOF

          chmod +x "$wrapper_dir/"*
          echo "$wrapper_dir" >> "$GITHUB_PATH"

      - name: Build release asset
        if: ${{ matrix.build_kind == 'zigbuild' }}
        shell: bash
        run: |
          set -euo pipefail
          ./.github/scripts/build-release-asset.sh \
            "${{ matrix.target }}" \
            "${{ matrix.profile }}" \
            "${{ matrix.flavor }}" \
            dist

      - name: Build router release asset with build-std
        if: ${{ matrix.build_kind == 'build-std' }}
        shell: bash
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          CARGO_TARGET_MIPS_UNKNOWN_LINUX_MUSL_LINKER: mips-linux-musl-gcc
          CARGO_TARGET_MIPSEL_UNKNOWN_LINUX_MUSL_LINKER: mipsel-linux-musl-gcc
          CC_mips_unknown_linux_musl: mips-linux-musl-gcc
          CC_mipsel_unknown_linux_musl: mipsel-linux-musl-gcc
          CXX_mips_unknown_linux_musl: mips-linux-musl-g++
          CXX_mipsel_unknown_linux_musl: mipsel-linux-musl-g++
          AR_mips_unknown_linux_musl: mips-linux-musl-ar
          AR_mipsel_unknown_linux_musl: mipsel-linux-musl-ar
          RANLIB_mips_unknown_linux_musl: mips-linux-musl-ranlib
          RANLIB_mipsel_unknown_linux_musl: mipsel-linux-musl-ranlib
        run: |
          set -euo pipefail
          cargo +nightly build \
            -Z build-std=std,panic_abort \
            --locked \
            --profile release-router \
            --no-default-features \
            --features router \
            --target "${{ matrix.target }}"

          mkdir -p dist
          binary_name="outline-ws-rust"
          dest_name="${binary_name}-router-v${VERSION}-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release-router/${binary_name}" "dist/${dest_name}"
          chmod +x "dist/${dest_name}"
          tar -C dist -czf "dist/${dest_name}.tar.gz" "${dest_name}"
          rm -f "dist/${dest_name}"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: [meta, build]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Delete old nightly assets
        if: ${{ needs.meta.outputs.is_nightly == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Nightly release does not exist yet, nothing to clean."
            exit 0
          fi

          mapfile -t assets < <(gh release view "$TAG" --json assets --jq '.assets[].name')
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No old assets to delete."
            exit 0
          fi

          for asset in "${assets[@]}"; do
            echo "Deleting old asset: $asset"
            gh release delete-asset "$TAG" "$asset" --yes
          done

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ needs.meta.outputs.release_name }}
          prerelease: ${{ inputs.prerelease }}
          make_latest: ${{ inputs.make_latest }}
          generate_release_notes: ${{ needs.meta.outputs.is_nightly != 'true' }}
          body: ${{ needs.meta.outputs.release_body }}
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
