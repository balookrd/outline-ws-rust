name: MIPS Legacy Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or commit SHA)"
        required: true
        default: "main"
        type: string

permissions:
  contents: write

concurrency:
  group: mips-legacy-release-${{ github.event.inputs.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 -c 'import re, pathlib; text = pathlib.Path("Cargo.toml").read_text(); match = re.search(r"^version = \"([^\"]+)\"$", text, flags=re.M); print(match.group(1) if match else (_ for _ in ()).throw(SystemExit("failed to read package version from Cargo.toml")))' )"
          tag="mips-legacy-v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=Legacy MIPS v${version}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mipsel-unknown-linux-musl
            cc_prefix: mipsel-linux-musl
            toolchain_url: https://musl.cc/mipsel-linux-musl-cross.tgz
          - target: mips-unknown-linux-musl
            cc_prefix: mips-linux-musl
            toolchain_url: https://musl.cc/mips-linux-musl-cross.tgz

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - name: Install musl cross toolchain
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/muslcc"
          curl -fsSL "${{ matrix.toolchain_url }}" -o "$RUNNER_TEMP/muslcc/toolchain.tgz"
          tar -xzf "$RUNNER_TEMP/muslcc/toolchain.tgz" -C "$RUNNER_TEMP/muslcc"
          toolchain_dir="$(find "$RUNNER_TEMP/muslcc" -maxdepth 1 -type d -name '*-cross' | head -n 1)"
          if [[ -z "$toolchain_dir" ]]; then
            echo "failed to locate extracted musl.cc toolchain" >&2
            exit 1
          fi
          echo "$toolchain_dir/bin" >> "$GITHUB_PATH"

      - name: Build legacy MIPS release asset
        shell: bash
        env:
          CARGO_TARGET_MIPS_UNKNOWN_LINUX_MUSL_LINKER: mips-linux-musl-gcc
          CARGO_TARGET_MIPSEL_UNKNOWN_LINUX_MUSL_LINKER: mipsel-linux-musl-gcc
          CC_mips_unknown_linux_musl: mips-linux-musl-gcc
          CC_mipsel_unknown_linux_musl: mipsel-linux-musl-gcc
          CXX_mips_unknown_linux_musl: mips-linux-musl-g++
          CXX_mipsel_unknown_linux_musl: mipsel-linux-musl-g++
          AR_mips_unknown_linux_musl: mips-linux-musl-ar
          AR_mipsel_unknown_linux_musl: mipsel-linux-musl-ar
          CARGO_BUILD_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          cargo +nightly build \
            -Z build-std=std,panic_abort \
            --locked \
            --profile release-router \
            --no-default-features \
            --features router \
            --target "${{ matrix.target }}"

          mkdir -p dist
          binary_name="outline-ws-rust"
          dest_name="${binary_name}-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release-router/${binary_name}" "dist/${dest_name}"
          chmod +x "dist/${dest_name}"
          tar -C dist -czf "dist/${dest_name}.tar.gz" "${dest_name}"
          rm -f "dist/${dest_name}"

      - uses: actions/upload-artifact@v4
        with:
          name: mips-legacy-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: mips-legacy-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Publish legacy MIPS release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          target_commitish: ${{ github.event.inputs.ref }}
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
