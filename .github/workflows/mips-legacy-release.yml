name: MIPS Legacy Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or commit SHA)"
        required: true
        default: "main"
        type: string
      tag_name:
        description: "GitHub Release tag to create/update (example: mips-nightly-2026-04-04)"
        required: true
        type: string
      prerelease:
        description: "Publish as prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: mips-legacy-release-${{ github.event.inputs.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mipsel-unknown-linux-musl
            profile: release-router
            flavor: router-build-std
          - target: mips-unknown-linux-musl
            profile: release-router
            flavor: router-build-std

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: goto-bus-stop/setup-zig@v2

      - uses: taiki-e/install-action@cargo-zigbuild

      - uses: Swatinem/rust-cache@v2

      - name: Build legacy MIPS release asset
        shell: bash
        run: |
          set -euo pipefail
          ./.github/scripts/build-release-asset.sh \
            "${{ matrix.target }}" \
            "${{ matrix.profile }}" \
            "${{ matrix.flavor }}" \
            dist

      - uses: actions/upload-artifact@v4
        with:
          name: mips-legacy-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: mips-legacy-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Publish legacy MIPS release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: Legacy MIPS ${{ github.event.inputs.tag_name }}
          target_commitish: ${{ github.event.inputs.ref }}
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
