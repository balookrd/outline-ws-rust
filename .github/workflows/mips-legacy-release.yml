name: MIPS Legacy Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or commit SHA)"
        required: true
        default: "main"
        type: string

permissions:
  contents: write

concurrency:
  group: mips-legacy-release-${{ github.event.inputs.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 -c 'import re, pathlib; text = pathlib.Path("Cargo.toml").read_text(); match = re.search(r"^version = \"([^\"]+)\"$", text, flags=re.M); print(match.group(1) if match else (_ for _ in ()).throw(SystemExit("failed to read package version from Cargo.toml")))' )"
          tag="mips-legacy-v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=Legacy MIPS v${version}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mipsel-unknown-linux-musl
            profile: release-router
            flavor: router-build-std
          - target: mips-unknown-linux-musl
            profile: release-router
            flavor: router-build-std

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: goto-bus-stop/setup-zig@v2

      - uses: taiki-e/install-action@cargo-zigbuild

      - uses: Swatinem/rust-cache@v2

      - name: Build legacy MIPS release asset
        shell: bash
        run: |
          set -euo pipefail
          ./.github/scripts/build-release-asset.sh \
            "${{ matrix.target }}" \
            "${{ matrix.profile }}" \
            "${{ matrix.flavor }}" \
            dist

      - uses: actions/upload-artifact@v4
        with:
          name: mips-legacy-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: mips-legacy-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Publish legacy MIPS release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          target_commitish: ${{ github.event.inputs.ref }}
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
