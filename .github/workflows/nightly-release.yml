name: Nightly Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: nightly-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n 1)"
          short_sha="${GITHUB_SHA::12}"
          tag="nightly-v${version}-${short_sha}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_name=Nightly v${version} (${short_sha})" >> "$GITHUB_OUTPUT"

      - name: Create nightly tag if missing
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists"
            exit 0
          fi
          git tag "${tag}" "${GITHUB_SHA}"
          git push origin "refs/tags/${tag}"

  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact_name: server-x86_64-unknown-linux-musl
            profile: release
            flavor: server
          - target: aarch64-unknown-linux-musl
            artifact_name: server-aarch64-unknown-linux-musl
            profile: release
            flavor: server
          - target: aarch64-unknown-linux-musl
            artifact_name: router-aarch64-unknown-linux-musl
            profile: release-router
            flavor: router

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - uses: Swatinem/rust-cache@v2

      - name: Build release asset
        shell: bash
        run: |
          set -euo pipefail
          ./.github/scripts/build-release-asset.sh \
            "${{ matrix.target }}" \
            "${{ matrix.profile }}" \
            "${{ matrix.flavor }}" \
            dist

      - uses: actions/upload-artifact@v7
        with:
          name: nightly-${{ matrix.artifact_name }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: nightly-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Publish nightly prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          prerelease: true
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
