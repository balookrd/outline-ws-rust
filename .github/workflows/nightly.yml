name: Nightly

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check main HEAD and move nightly tag
        id: check
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main --tags --force

          head_subject="$(git log -1 --format=%s origin/main)"
          target_commit="$(git rev-parse origin/main)"

          if [[ "${head_subject}" =~ ^release:\ cut\ v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Skipping nightly: main HEAD is release bump commit: ${head_subject}"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git ls-remote --exit-code --tags origin refs/tags/nightly >/dev/null 2>&1; then
            git push origin :refs/tags/nightly
          fi

          git tag -f nightly "${target_commit}"
          git push origin refs/tags/nightly --force

          echo "should_run=true" >> "$GITHUB_OUTPUT"

  release:
    needs: prepare
    if: ${{ needs.prepare.outputs.should_run == 'true' }}
    uses: ./.github/workflows/_release-build.yml
    with:
      tag: nightly
      release_name: Nightly
      prerelease: true
      make_latest: "false"
