name: Release

on:
  workflow_dispatch:
    inputs:
      major_minor:
        description: "Release series in MAJOR.MINOR format (example: 1.7)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.major_minor }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - id: version
        name: Compute next version
        shell: bash
        run: |
          set -euo pipefail

          series="${{ github.event.inputs.major_minor }}"
          if [[ ! "$series" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "major_minor must match MAJOR.MINOR, got: $series" >&2
            exit 1
          fi

          series_pattern="^v${series//./\\.}\\.[0-9]+$"
          git fetch origin '+refs/tags/*:refs/tags/*' --force

          latest_tag="$(
            { git tag --list | grep -E "${series_pattern}" || true; } | sort -V | tail -n 1
          )"

          current_version="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n 1)"

          echo "Fetched release tags for ${series}:"
          git tag --list | grep -E "${series_pattern}" || true
          echo "Current Cargo.toml version: ${current_version}"

          if [[ -n "$latest_tag" ]]; then
            patch="${latest_tag##*.}"
            next_patch=$((patch + 1))
          else
            next_patch=0
          fi

          version="${series}.${next_patch}"
          tag="v${version}"

          if [[ "$(printf '%s\n%s\n' "$current_version" "$version" | sort -V | tail -n 1)" != "$version" ]]; then
            echo "Computed release version ${version} is older than current Cargo.toml version ${current_version}" >&2
            exit 1
          fi

          if git show-ref --verify --quiet "refs/tags/${tag}"; then
            echo "Tag ${tag} already exists" >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Update crate version
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import os
          import re

          version = os.environ["VERSION"]
          path = Path("Cargo.toml")
          text = path.read_text()

          new_text, count = re.subn(
              r'^version = "[^"]+"$',
              f'version = "{version}"',
              text,
              count=1,
              flags=re.M,
          )
          if count != 1:
              raise SystemExit("failed to update package version in Cargo.toml")

          path.write_text(new_text)
          PY

      - name: Update Cargo.lock root package version
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import os
          import re

          version = os.environ["VERSION"]
          path = Path("Cargo.lock")
          text = path.read_text()

          pattern = r'(\[\[package\]\]\nname = "outline-ws-rust"\nversion = ")([^"]+)(")'
          new_text, count = re.subn(pattern, r'\g<1>' + version + r'\3', text, count=1)
          if count != 1:
              raise SystemExit("failed to update outline-ws-rust version in Cargo.lock")

          path.write_text(new_text)
          PY

      - name: Show release version state
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          echo "Target tag: ${TAG}"
          echo "Target version: ${VERSION}"
          echo "Cargo.toml version line:"
          grep -nE '^version = ' Cargo.toml
          echo "Cargo.lock root package block:"
          sed -n '/^\[\[package\]\]$/,/^$/p' Cargo.lock | sed -n '/name = "outline-ws-rust"/,/^$/p'

      - name: Commit version bump
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git add Cargo.toml Cargo.lock
          if git diff --cached --quiet; then
            echo "No version file changes for ${TAG}; release will use current HEAD"
            exit 0
          fi
          git commit -m "release: cut ${TAG}"

      - name: Push release commit to main
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:main

      - name: Print next steps
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          cat <<EOF
          Release commit pushed to main.

          Create and push a signed tag locally:

            git fetch origin
            git checkout main
            git pull --ff-only origin main
            git tag -s ${TAG} -m "${TAG}"
            git push origin ${TAG}

          After that, workflow "Tag Release" will build and publish the release.
          EOF
