name: Router Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or commit SHA)"
        required: true
        default: "main"
        type: string

permissions:
  contents: write

concurrency:
  group: router-release-${{ github.event.inputs.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 -c 'import re, pathlib; text = pathlib.Path("Cargo.toml").read_text(); match = re.search(r"^version = \"([^\"]+)\"$", text, flags=re.M); print(match.group(1) if match else (_ for _ in ()).throw(SystemExit("failed to read package version from Cargo.toml")))' )"
          tag="router-v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=Router Release v${version}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            build_kind: zigbuild
          - target: mipsel-unknown-linux-musl
            build_kind: build-std
            cc_prefix: mipsel-linux-musl
            zig_target: mipsel-linux-musleabi
          - target: mips-unknown-linux-musl
            build_kind: build-std
            cc_prefix: mips-linux-musl
            zig_target: mips-linux-musleabi

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.1

      - name: Show Zig version
        shell: bash
        run: zig version

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ matrix.build_kind == 'zigbuild' }}
        with:
          targets: ${{ matrix.target }}

      - uses: dtolnay/rust-toolchain@nightly
        if: ${{ matrix.build_kind == 'build-std' }}
        with:
          components: rust-src

      - uses: taiki-e/install-action@cargo-zigbuild
        if: ${{ matrix.build_kind == 'zigbuild' }}

      - uses: Swatinem/rust-cache@v2

      - name: Create Zig MIPS toolchain wrappers
        if: ${{ matrix.build_kind == 'build-std' }}
        shell: bash
        run: |
          set -euo pipefail
          wrapper_dir="$RUNNER_TEMP/zig-cross"
          mkdir -p "$wrapper_dir"

          cat > "$wrapper_dir/${{ matrix.cc_prefix }}-gcc" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          filtered=()
          for arg in "\$@"; do
            case "\$arg" in
              --target=mips-unknown-linux-musl|--target=mipsel-unknown-linux-musl)
                ;;
              *)
                filtered+=("\$arg")
                ;;
            esac
          done
          exec zig cc -target ${{ matrix.zig_target }} "\${filtered[@]}"
          EOF

          cat > "$wrapper_dir/${{ matrix.cc_prefix }}-g++" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          filtered=()
          for arg in "\$@"; do
            case "\$arg" in
              --target=mips-unknown-linux-musl|--target=mipsel-unknown-linux-musl)
                ;;
              *)
                filtered+=("\$arg")
                ;;
            esac
          done
          exec zig c++ -target ${{ matrix.zig_target }} "\${filtered[@]}"
          EOF

          cat > "$wrapper_dir/${{ matrix.cc_prefix }}-ar" <<'EOF'
          #!/usr/bin/env bash
          exec zig ar "$@"
          EOF

          cat > "$wrapper_dir/${{ matrix.cc_prefix }}-ranlib" <<'EOF'
          #!/usr/bin/env bash
          exec zig ranlib "$@"
          EOF

          chmod +x \
            "$wrapper_dir/${{ matrix.cc_prefix }}-gcc" \
            "$wrapper_dir/${{ matrix.cc_prefix }}-g++" \
            "$wrapper_dir/${{ matrix.cc_prefix }}-ar" \
            "$wrapper_dir/${{ matrix.cc_prefix }}-ranlib"
          echo "$wrapper_dir" >> "$GITHUB_PATH"

      - name: Build router release asset with cargo-zigbuild
        if: ${{ matrix.build_kind == 'zigbuild' }}
        shell: bash
        run: |
          set -euo pipefail
          ./.github/scripts/build-release-asset.sh \
            "${{ matrix.target }}" \
            "release-router" \
            "router" \
            dist

      - name: Build router release asset with build-std
        if: ${{ matrix.build_kind == 'build-std' }}
        shell: bash
        env:
          CARGO_TARGET_MIPS_UNKNOWN_LINUX_MUSL_LINKER: mips-linux-musl-gcc
          CARGO_TARGET_MIPSEL_UNKNOWN_LINUX_MUSL_LINKER: mipsel-linux-musl-gcc
          CC_mips_unknown_linux_musl: mips-linux-musl-gcc
          CC_mipsel_unknown_linux_musl: mipsel-linux-musl-gcc
          CXX_mips_unknown_linux_musl: mips-linux-musl-g++
          CXX_mipsel_unknown_linux_musl: mipsel-linux-musl-g++
          AR_mips_unknown_linux_musl: mips-linux-musl-ar
          AR_mipsel_unknown_linux_musl: mipsel-linux-musl-ar
          RANLIB_mips_unknown_linux_musl: mips-linux-musl-ranlib
          RANLIB_mipsel_unknown_linux_musl: mipsel-linux-musl-ranlib
          CARGO_BUILD_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          cargo +nightly build \
            -Z build-std=std,panic_abort \
            --locked \
            --profile release-router \
            --no-default-features \
            --features router \
            --target "${{ matrix.target }}"

          version="${{ needs.prepare.outputs.version }}"
          mkdir -p dist
          binary_name="outline-ws-rust"
          dest_name="${binary_name}-v${version}-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release-router/${binary_name}" "dist/${dest_name}"
          chmod +x "dist/${dest_name}"
          tar -C dist -czf "dist/${dest_name}.tar.gz" "${dest_name}"
          rm -f "dist/${dest_name}"

      - uses: actions/upload-artifact@v4
        with:
          name: router-release-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: router-release-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Publish router release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          target_commitish: ${{ github.event.inputs.ref }}
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
