[package]
name = "outline-ws-rust"
version = "0.1.0"
edition = "2024"

[dependencies]
aes-gcm = "0.10"
anyhow = "1.0"
bytes = "1.10"
chacha20poly1305 = "0.10"
clap = { version = "4.5", features = ["derive", "env"] }
futures-util = { version = "0.3", default-features = false, features = ["sink", "std"] }
h3 = "0.0.8"
h3-quinn = "0.0.10"
hkdf = "0.12"
http = "1.3"
http-body-util = "0.1"
hyper = { version = "1.7", features = ["client", "http2"] }
hyper-util = { version = "0.1", features = ["tokio"] }
md5 = "0.7"
pin-project-lite = "0.2"
once_cell = "1.21"
prometheus = "0.13"
quinn = { version = "0.11", default-features = false, features = ["runtime-tokio", "rustls-ring"] }
rand = "0.8"
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha1 = "0.10"
sockudo-ws = { git = "https://github.com/RustNSparks/sockudo-ws", package = "sockudo-ws", default-features = false, features = ["http3", "rustls-webpki-roots", "ring", "fastrand"] }
socket2 = "0.5"
tokio = { version = "1.44", features = ["full"] }
tokio-rustls = "0.26"
tokio-tungstenite = { version = "0.28", features = ["rustls-tls-webpki-roots"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
url = { version = "2.5", features = ["serde"] }
webpki-roots = "0.26"

[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2"

[patch.crates-io]
h3 = { path = "vendor/h3" }
