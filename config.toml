[socks5]
# Optional. If omitted, the SOCKS5 listener is disabled.
listen = "[::]:1080"
# Optional local SOCKS5 auth for clients.
#
# [[socks5.users]]
# username = "alice"
# password = "secret1"
#
# [[socks5.users]]
# username = "bob"
# password = "secret2"

[metrics]
listen = "[::1]:9090"

[tun]
# Existing TUN device path. Creation, IP addresses and routes stay outside the app.
# Linux example:
# path = "/dev/net/tun"
# name = "tun0"
# macOS / BSD example:
# path = "/dev/tun0"
# mtu = 1500
# max_flows = 4096
# idle_timeout_secs = 300

# [tun.tcp]
# connect_timeout_secs = 10
# handshake_timeout_secs = 15
# half_close_timeout_secs = 60
# max_pending_server_bytes = 4194304
# backlog_abort_grace_secs = 3
# backlog_hard_limit_multiplier = 2
# backlog_no_progress_abort_secs = 8
# max_buffered_client_segments = 4096
# max_buffered_client_bytes = 262144
# max_retransmits = 12

# [bypass]
# Bypass (direct connection, not through the tunnel) for SOCKS5 traffic.
# Only IP targets are matched; domain names always go through the tunnel.
#
# Load from a file (one CIDR per line, # comments and blank lines are ignored):
# file = "/etc/outline/bypass.txt"
# file_poll_secs = 60   # how often to check the file for changes (default: 60)
#
# Inline prefixes (combined with file if both are set):
# prefixes = ["10.0.0.0/8", "192.168.0.0/16", "172.16.0.0/12", "fc00::/7"]
#
# Inverted (bypass everything NOT in the list; listed prefixes go through tunnel):
# prefixes = ["8.8.8.8/32"]
# invert = true

[probe]
interval_secs = 30
timeout_secs = 10
max_concurrent = 4
max_dials = 2

[probe.ws]
enabled = true

[probe.http]
url = "http://example.com/"

[probe.dns]
server = "1.1.1.1"
port = 53
name = "example.com"

[load_balancing]
mode = "active_active"          # "active_active" or "active_passive"
routing_scope = "per_flow"      # "per_flow", "per_uplink", or "global"
warm_standby_tcp = 1
warm_standby_udp = 1
sticky_ttl_secs = 300
hysteresis_ms = 50
failure_cooldown_secs = 10
rtt_ewma_alpha = 0.3
failure_penalty_ms = 500
failure_penalty_max_ms = 30000
failure_penalty_halflife_secs = 60

[[uplinks]]
name = "primary"
transport = "websocket"
tcp_ws_url = "wss://example.com/SECRET/tcp"
weight = 1.0
# requested mode; runtime fallback order is h3 -> h2 -> http1
tcp_ws_mode = "h3"
# Linux only, requires CAP_NET_ADMIN if set
# fwmark = 100
# Prefer IPv6 addresses first for this uplink
# ipv6_first = true
udp_ws_url = "wss://example.com/SECRET/udp"
udp_ws_mode = "h3"
method = "chacha20-ietf-poly1305"
password = "Secret0"
# for ss2022 methods use a base64 PSK, for example:
# method = "2022-blake3-aes-128-gcm"
# password = "AQIDBAUGBwgJCgsMDQ4PEA=="
# method = "2022-blake3-chacha20-poly1305"
# password = "AQIDBAUGBwgJCgsMDQ4PEBESExQVFhcYGRobHB0eHyA="

[[uplinks]]
name = "backup"
transport = "websocket"
tcp_ws_url = "wss://backup.example.com/SECRET/tcp"
weight = 0.8
# requested mode; runtime fallback order is h2 -> http1
tcp_ws_mode = "h2"
udp_ws_url = "wss://backup.example.com/SECRET/udp"
udp_ws_mode = "h2"
method = "chacha20-ietf-poly1305"
password = "Secret0"

