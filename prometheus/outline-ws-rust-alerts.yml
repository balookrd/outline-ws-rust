groups:
  - name: outline-ws-rust
    interval: 30s
    rules:
      - alert: Socks5OutlineWsStatusEndpointDown
        expr: up{job="outline-ws-rust"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: outline-ws-rust metrics endpoint is down
          description: Prometheus cannot scrape the status/metrics endpoint for 2 minutes.

      - alert: Socks5OutlineWsAllTcpUplinksUnhealthy
        expr: sum by (instance) (outline_ws_rust_uplink_health{transport="tcp",job="outline-ws-rust"}) == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: All TCP uplinks are unhealthy
          description: No healthy TCP uplink is available on {{ $labels.instance }}.

      - alert: Socks5OutlineWsAllUdpUplinksUnhealthy
        expr: sum by (instance) (outline_ws_rust_uplink_health{transport="udp",job="outline-ws-rust"}) == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: All UDP uplinks are unhealthy
          description: No healthy UDP uplink is available on {{ $labels.instance }}.

      - alert: Socks5OutlineWsHighFailoverRate
        expr: sum by (instance) (rate(outline_ws_rust_uplink_failovers_total{job="outline-ws-rust"}[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Elevated uplink failover rate
          description: Runtime failovers are happening continuously on {{ $labels.instance }}.

      - alert: Socks5OutlineWsProbeErrors
        expr: |
          (
            sum by (instance, uplink, transport) (rate(outline_ws_rust_probe_runs_total{job="outline-ws-rust",result="error"}[15m]))
            /
            clamp_min(sum by (instance, uplink, transport) (rate(outline_ws_rust_probe_runs_total{job="outline-ws-rust"}[15m])), 0.001)
          ) > 0.2
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Probe error ratio is high
          description: Probe error ratio for uplink {{ $labels.uplink }} / {{ $labels.transport }} is above 20%.

      - alert: Socks5OutlineWsWarmStandbyDepleted
        expr: outline_ws_rust_uplink_standby_ready{job="outline-ws-rust"} == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Warm-standby pool is empty
          description: No prewarmed standby websocket is available for uplink {{ $labels.uplink }} / {{ $labels.transport }}.

      - alert: Socks5OutlineWsPenaltySaturation
        expr: |
          (
            outline_ws_rust_uplink_penalty_seconds{job="outline-ws-rust"}
            /
            clamp_min(outline_ws_rust_uplink_effective_latency_seconds{job="outline-ws-rust"}, 0.001)
          ) > 0.6
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Uplink is heavily penalized
          description: Failure penalty dominates effective latency for uplink {{ $labels.uplink }} / {{ $labels.transport }}.

      - alert: Socks5OutlineWsEffectiveLatencyInflation
        expr: |
          (
            outline_ws_rust_uplink_effective_latency_seconds{job="outline-ws-rust"}
            /
            clamp_min(outline_ws_rust_uplink_latency_seconds{job="outline-ws-rust"}, 0.001)
          ) > 2
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Effective latency is inflated by recent failures
          description: Effective latency is more than 2x raw probe latency for uplink {{ $labels.uplink }} / {{ $labels.transport }}.

      - alert: Socks5OutlineWsTunFlowPressureHigh
        expr: |
          (
            sum by (instance) (outline_ws_rust_tun_flows_active{job="outline-ws-rust"})
            /
            clamp_min(max by (instance) (outline_ws_rust_tun_max_flows{job="outline-ws-rust"}), 1)
          ) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: TUN flow table pressure is high
          description: Active TUN UDP flows are above 80% of configured capacity on {{ $labels.instance }}.

      - alert: Socks5OutlineWsTunFlowEvictions
        expr: sum by (instance) (rate(outline_ws_rust_tun_flows_total{job="outline-ws-rust",event="evicted"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: TUN flow table is evicting live flows
          description: TUN UDP flow evictions are happening continuously on {{ $labels.instance }}.

      - alert: Socks5OutlineWsTunIdleTimeoutBurst
        expr: sum by (instance) (rate(outline_ws_rust_tun_flows_total{job="outline-ws-rust",event="idle_timeout"}[15m])) > 0.1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: TUN idle timeouts are elevated
          description: TUN UDP flows are timing out at an elevated rate on {{ $labels.instance }}.

      - alert: Socks5OutlineWsTunReadOrSendErrors
        expr: sum by (instance) (rate(outline_ws_rust_tun_flows_total{job="outline-ws-rust",event=~"read_error|send_error"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: TUN UDP flows are failing during runtime I/O
          description: TUN UDP flow read/send errors are being observed on {{ $labels.instance }}.

      - alert: Socks5OutlineWsTunTcpPendingHandshakes
        expr: |
          max by (instance) (
            sum by (instance, uplink) (
              outline_ws_rust_tun_tcp_flows_active{job="outline-ws-rust",uplink="pending"}
            )
          ) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: TUN TCP handshakes are stuck in pending state
          description: One or more TUN TCP flows have remained in the pending uplink-selection or connect phase on {{ $labels.instance }} for over 10 minutes.

      - alert: Socks5OutlineWsTunTcpConnectFailuresHigh
        expr: |
          sum by (instance) (
            rate(outline_ws_rust_tun_tcp_events_total{job="outline-ws-rust",event="connect_failed"}[10m])
          ) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: TUN TCP upstream connect failures are elevated
          description: TUN TCP flows are repeatedly failing to establish an upstream connection on {{ $labels.instance }}.

      - alert: Socks5OutlineWsTunTcpIoErrorsHigh
        expr: |
          sum by (instance) (
            rate(outline_ws_rust_tun_tcp_events_total{job="outline-ws-rust",event="io_error"}[10m])
          ) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: TUN TCP runtime I/O errors are elevated
          description: Established TUN TCP flows are hitting runtime I/O failures at an elevated rate on {{ $labels.instance }}.

      - alert: Socks5OutlineWsTunTcpFlowEvictions
        expr: |
          sum by (instance) (
            rate(outline_ws_rust_tun_tcp_events_total{job="outline-ws-rust",event="evicted"}[10m])
          ) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: TUN TCP flows are being evicted
          description: The TUN TCP flow table is evicting stale flows on {{ $labels.instance }}, which may indicate capacity or cleanup issues.

      - alert: Socks5OutlineWsTunTcpAsyncConnectErrorsHigh
        expr: |
          sum by (instance) (
            rate(outline_ws_rust_tun_tcp_async_connects_total{job="outline-ws-rust",result="error"}[10m])
          ) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: TUN TCP async connect errors are elevated
          description: Async TUN TCP upstream connect attempts are failing at an elevated rate on {{ $labels.instance }}.
