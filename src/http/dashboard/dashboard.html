<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" id="themeColorMeta" content="#0f1626">
<title>Network Dashboard</title>
<style>
:root, [data-theme="dark"] {
  color-scheme: dark;
  --bg: #0a0f1c;
  --nav: #0f1626;
  --nav-2: #1a2238;
  --nav-3: #243049;
  --nav-text: #cbd5e1;
  --nav-muted: #8ea0bd;
  --nav-brand: #ffffff;
  --nav-hover: rgba(255, 255, 255, 0.04);
  --nav-card-bg: rgba(255, 255, 255, 0.02);
  --nav-card-border: rgba(255, 255, 255, 0.06);
  --nav-card-text: #ffffff;
  --text: #e2e8f0;
  --muted: #8ea0bd;
  --line: #1e293b;
  --line-strong: #334155;
  --soft: #151c2e;
  --soft-2: #111828;
  --panel: #131b2c;
  --panel-tint: #0f1626;
  --green: #22c55e;
  --green-strong: #86efac;
  --green-soft: rgba(34, 197, 94, 0.15);
  --amber: #f59e0b;
  --amber-soft: rgba(245, 158, 11, 0.15);
  --gray-soft: rgba(148, 163, 184, 0.12);
  --blue: #6366f1;
  --blue-soft: rgba(99, 102, 241, 0.18);
  --red: #f87171;
  --red-soft: rgba(248, 113, 113, 0.15);
  --dot-idle: #475569;
  --shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
  --chip-mode-text: #c7d2fe;
  --chip-mode-border: rgba(99, 102, 241, 0.3);
  --chip-scope-bg: rgba(34, 211, 238, 0.12);
  --chip-scope-text: #a5f3fc;
  --chip-scope-border: rgba(34, 211, 238, 0.28);
  --chip-fb-border: rgba(34, 197, 94, 0.3);
  --error-bg: rgba(248, 113, 113, 0.15);
  --error-text: #fca5a5;
  --error-border: rgba(248, 113, 113, 0.35);
}
[data-theme="light"] {
  color-scheme: light;
  --bg: #f8fafc;
  --nav: #ffffff;
  --nav-2: #f1f5f9;
  --nav-3: #e2e8f0;
  --nav-text: #334155;
  --nav-muted: #64748b;
  --nav-brand: #0f172a;
  --nav-hover: rgba(15, 23, 42, 0.05);
  --nav-card-bg: #f8fafc;
  --nav-card-border: #e2e8f0;
  --nav-card-text: #0f172a;
  --text: #0f172a;
  --muted: #64748b;
  --line: #e2e8f0;
  --line-strong: #cbd5e1;
  --soft: #f1f5f9;
  --soft-2: #f8fafc;
  --panel: #ffffff;
  --panel-tint: #f8fafc;
  --green: #22c55e;
  --green-strong: #15803d;
  --green-soft: #dcfce7;
  --amber: #f59e0b;
  --amber-soft: #fef3c7;
  --gray-soft: #f1f5f9;
  --blue: #6366f1;
  --blue-soft: #eef2ff;
  --red: #dc2626;
  --red-soft: #fee2e2;
  --dot-idle: #cbd5e1;
  --shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
  --chip-mode-text: #3730a3;
  --chip-mode-border: #e0e7ff;
  --chip-scope-bg: #ecfeff;
  --chip-scope-text: #155e75;
  --chip-scope-border: #cffafe;
  --chip-fb-border: #bbf7d0;
  --error-bg: #fef2f2;
  --error-text: #991b1b;
  --error-border: #fecaca;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); background: var(--bg); font-size: 13px; line-height: 1.34; }
.shell { min-height: 100vh; display: grid; grid-template-columns: 214px 1fr; }
.nav { background: var(--nav); color: var(--nav-text); display: flex; flex-direction: column; min-height: 100vh; border-right: 1px solid var(--nav-card-border); padding: 12px 8px; }
.brand { min-height: 52px; display: flex; gap: 10px; align-items: center; padding: 6px 16px 8px; color: var(--nav-brand); }
.brand-text { display: flex; flex-direction: column; gap: 2px; line-height: 1.1; min-width: 0; }
.brand-title { font-weight: 760; font-size: 14px; color: var(--nav-brand); letter-spacing: 0; white-space: nowrap; }
.brand-subtitle { font-size: 10px; color: var(--nav-text); opacity: 0.7; white-space: nowrap; }
.logo { width: 38px; height: 38px; display: grid; place-items: center; flex-shrink: 0; }
.logo img { width: 38px; height: 38px; object-fit: contain; display: block; }
.menu { padding: 0; display: grid; gap: 4px; margin-top: 4px; }
.item { min-height: 38px; width: 100%; border: 0; border-radius: 11px; display: flex; align-items: center; gap: 9px; padding: 0 10px; color: var(--nav-text); background: transparent; text-align: left; font-size: 13px; font-weight: 640; cursor: pointer; }
.item:hover { background: var(--nav-hover); }
.item.active { background: var(--blue); color: #fff; }
.item-icon { width: 20px; display: inline-grid; place-items: center; font-size: 14px; opacity: .85; }
.spacer { flex: 1; }
.nav-footer { padding: 10px; display: grid; gap: 8px; }
.nav-card { border: 1px solid var(--nav-card-border); border-radius: 8px; padding: 10px 12px; display: grid; gap: 4px; background: var(--nav-card-bg); }
.nav-card-title { color: var(--nav-muted); font-size: 11.5px; }
.nav-card-value { display: flex; align-items: center; gap: 8px; color: var(--nav-card-text); font-size: 12.5px; }
.nav-card-value .dot { width: 7px; height: 7px; border-radius: 99px; background: var(--green); }
main { padding: 12px 16px 16px; min-width: 0; background: var(--bg); }
.topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
.topbar-copy { display: grid; gap: 4px; }
h1 { margin: 0; font-size: 18px; line-height: 1.15; font-weight: 700; letter-spacing: 0; }
.subtitle { color: var(--muted); font-size: 11px; }
.toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.updated-inline { color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 6px; min-height: 32px; }
.refresh { min-height: 32px; border: 1px solid var(--line); background: var(--panel); border-radius: 10px; padding: 0 10px; display: flex; align-items: center; gap: 6px; color: var(--text); font-size: 12px; font-weight: 650; cursor: pointer; }
.refresh.off { color: var(--muted); background: var(--soft-2); }
.dot { width: 10px; height: 10px; border-radius: 99px; background: var(--green); display: inline-block; }
.refresh.off .dot { background: var(--dot-idle); }
.theme-toggle { border: 1px solid var(--line); background: var(--panel); border-radius: 10px; width: 34px; height: 32px; display: grid; place-items: center; color: var(--text); font-size: 15px; cursor: pointer; }
.theme-toggle:hover { background: var(--soft); }
.summary-grid { display: grid; grid-template-columns: repeat(5, minmax(128px, 1fr)); gap: 8px; margin-bottom: 12px; }
.summary-card { background: var(--panel); border: 1px solid var(--line); border-radius: 13px; padding: 10px 12px; box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.summary-copy { display: grid; gap: 4px; min-width: 0; }
.summary-label { color: var(--muted); font-size: 10px; font-weight: 700; }
.summary-value { font-size: 16px; font-weight: 800; line-height: 1; }
.summary-value.good { color: var(--green); }
.summary-icon { width: 30px; height: 30px; border-radius: 10px; display: grid; place-items: center; background: var(--soft); color: var(--blue); font-size: 14px; flex: 0 0 auto; }
.summary-icon.good { background: var(--green-soft); color: var(--green-strong); }
.summary-icon.warn { background: var(--blue-soft); color: var(--blue); }
.summary-icon.muted { background: var(--gray-soft); color: var(--muted); }
.stack { display: grid; gap: 8px; }
.instance-panel { background: var(--panel); border: 1px solid var(--line); border-radius: 18px; overflow: hidden; box-shadow: var(--shadow); }
.instance-panel.collapsed .instance-panel-body { display: none; }
.instance-panel-header { min-height: 46px; display: flex; align-items: center; gap: 10px; padding: 14px 18px; cursor: pointer; user-select: none; }
.instance-panel:not(.collapsed) .instance-panel-header { border-bottom: 1px solid var(--line); }
.panel-title { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1; }
.panel-title strong { font-size: 15px; font-weight: 600; }
.collapse-chev { color: var(--muted); font-size: 14px; transition: transform .15s; }
.instance-panel.collapsed .collapse-chev { transform: rotate(180deg); }
.instance-panel-body { padding: 13px 18px; display: grid; gap: 12px; background: var(--panel); }
.section-title { font-size: 13px; font-weight: 600; color: #334155; }
.group-table { border: 1px solid var(--line); border-radius: 18px; overflow: hidden; background: var(--panel); }
.group-table-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 18px; background: var(--panel-tint); border-bottom: 1px solid var(--line); cursor: pointer; user-select: none; }
.group-table.collapsed .rows { display: none; }
.group-table.collapsed .group-table-head { border-bottom: 0; }
.group-table-title { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 13.5px; }
.group-count { min-height: 28px; display: inline-flex; align-items: center; padding: 0 10px; border-radius: 999px; background: var(--gray-soft); color: var(--muted); font-size: 11px; font-weight: 730; }
.group-table-meta { display: flex; align-items: center; gap: 10px; color: var(--green-strong); font-size: 12px; flex-wrap: wrap; justify-content: flex-end; }
.cfg-chips { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.cfg-chip { min-height: 26px; display: inline-flex; align-items: center; gap: 5px; border-radius: 999px; padding: 0 10px; font-size: 11px; font-weight: 760; background: var(--soft); color: var(--text); border: 1px solid var(--line); }
.cfg-chip .cfg-key { color: var(--muted); font-weight: 500; }
.cfg-chip.mode { background: var(--blue-soft); color: var(--chip-mode-text); border-color: var(--chip-mode-border); }
.cfg-chip.scope { background: var(--chip-scope-bg); color: var(--chip-scope-text); border-color: var(--chip-scope-border); }
.cfg-chip.fb-on { background: var(--green-soft); color: var(--green-strong); border-color: var(--chip-fb-border); }
.cfg-chip.fb-off { background: var(--gray-soft); color: var(--muted); border-color: var(--line); }
.cfg-active { color: var(--green-strong); font-weight: 600; white-space: nowrap; }
.rows { width: 100%; }
.rows-head,.row { display: grid; grid-template-columns: minmax(120px, 1.3fr) minmax(90px, .9fr) minmax(90px, .8fr) minmax(90px, .8fr) minmax(80px, .7fr) minmax(120px, 1fr) 100px; gap: 12px; align-items: center; padding: 13px 18px; }
.proto-pill { min-height: 24px; display: inline-flex; align-items: center; padding: 0 9px; border-radius: 999px; font-size: 11px; font-weight: 760; letter-spacing: .02em; text-transform: uppercase; background: var(--soft); color: var(--text); border: 1px solid var(--line); }
.proto-pill.proto-vless { background: var(--blue-soft); color: var(--chip-mode-text); border-color: var(--chip-mode-border); }
.proto-pill.proto-shadowsocks { background: var(--chip-scope-bg); color: var(--chip-scope-text); border-color: var(--chip-scope-border); }
.proto-pill.proto-ws { background: var(--green-soft); color: var(--green-strong); border-color: var(--chip-fb-border); }
.proto-pill .proto-leg { font-size: 9.5px; opacity: .7; margin-right: 5px; padding: 1px 5px; border-radius: 4px; background: rgba(0,0,0,.12); letter-spacing: .04em; }
.proto-stack { display: flex; flex-direction: column; gap: 4px; align-items: flex-start; }
.proto-pill.proto-downgraded { border-style: dashed; box-shadow: inset 0 0 0 1px rgba(214, 130, 30, .35); }
.proto-pill .proto-dg { margin-left: 5px; font-size: 10px; opacity: .85; color: #b8631a; }
.rows-head { min-height: 46px; color: var(--muted); font-size: 11px; font-weight: 780; text-transform: uppercase; letter-spacing: .08em; border-bottom: 1px solid var(--line); }
.row { border-bottom: 1px solid var(--line); font-size: 13px; }
.row:last-child { border-bottom: 0; }
.uplink-cell { display: flex; align-items: center; gap: 8px; font-weight: 500; }
.status-pill { min-height: 26px; display: inline-flex; align-items: center; gap: 5px; border-radius: 999px; padding: 0 10px; font-size: 11px; font-weight: 760; background: var(--gray-soft); color: var(--muted); }
.status-pill.good { background: var(--green-soft); color: var(--green-strong); }
.status-pill.warn { background: var(--amber-soft); color: #b45309; }
.status-pill.bad { background: var(--gray-soft); color: var(--muted); }
.status-dot { width: 8px; height: 8px; border-radius: 99px; background: var(--dot-idle); flex: 0 0 auto; }
.status-dot.good { background: var(--green); }
.status-dot.warn { background: var(--amber); }
.status-dot.bad { background: var(--dot-idle); }
.muted-cell { color: var(--muted); }
.action-btn { min-height: 26px; padding: 0 9px; border-radius: 8px; border: 1px solid var(--line-strong); background: var(--soft); color: var(--text); font-weight: 700; font-size: 11px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
.action-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
.action-btn.primary:hover { background: #4f46e5; }
.action-btn:disabled { opacity: .5; cursor: default; }
.error { border: 1px solid var(--error-border); background: var(--error-bg); color: var(--error-text); border-radius: 12px; padding: 10px 14px; font-size: 12px; }
@media (max-width: 1240px) {
  .summary-grid { grid-template-columns: repeat(2, minmax(180px, 1fr)); }
}
@media (max-width: 1024px) {
  .shell { grid-template-columns: 1fr; }
  .nav { display: none; }
  main { padding: 22px 18px 30px; }
  .topbar { flex-direction: column; align-items: stretch; }
  .toolbar { justify-content: flex-start; }
}
@media (max-width: 760px) {
  .menu,.nav-footer { display: none; }
  .summary-grid { grid-template-columns: 1fr; }
  .rows-head { display: none; }
  .row { grid-template-columns: 1fr; gap: 6px; }
}
</style>
</head>
<body>
<div class="shell">
  <aside class="nav">
    <div class="brand">
      <span class="logo"><img src="/dashboard/outline-logo.png" alt="" aria-hidden="true"></span>
      <span class="brand-text">
        <span class="brand-title">Network Dashboard</span>
        <span class="brand-subtitle">outline-ws-rust control</span>
      </span>
    </div>
    <nav class="menu">
      <a class="item active" href="/dashboard"><span class="item-icon">▣</span><span>Instances</span></a>
      <a class="item" href="/dashboard/uplinks"><span class="item-icon">⚒</span><span>Uplinks</span></a>
      <button class="item" type="button"><span class="item-icon">◉</span><span>Alerts</span></button>
      <button class="item" type="button"><span class="item-icon">▤</span><span>Logs</span></button>
      <button class="item" type="button"><span class="item-icon">⚙</span><span>Settings</span></button>
    </nav>
    <div class="spacer"></div>
  </aside>
  <main>
    <div class="topbar">
      <div class="topbar-copy">
        <h1>Instances</h1>
        <div class="subtitle">Overview of all instances, uplink groups and uplinks</div>
      </div>
      <div class="toolbar">
        <div class="updated-inline">↻ Last updated: <span id="updatedAtInline">-</span></div>
        <button class="refresh" id="refreshBtn" type="button"><span class="dot"></span><span id="refreshLabel">Auto</span></button>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme" title="Toggle theme"><span id="themeIcon">☀</span></button>
      </div>
    </div>
    <section class="summary-grid" id="summaryGrid"></section>
    <div id="errors"></div>
    <section class="stack" id="groups"></section>
  </main>
</div>
<script>
const refreshMs = __DASHBOARD_REFRESH_MS__;
let timer = null;
let autoRefreshEnabled = true;
const state = { instances: [], collapsedInstances: new Set(), collapsedGroups: new Set(), errors: [] };

function healthy(u) { return u.tcp_healthy !== false && u.udp_healthy !== false; }
function isActive(u) { return Boolean(u.active_global || u.active_tcp || u.active_udp); }
function computeStats() {
  const healthyInstances = state.instances.filter(i => i.ok).length;
  const totalInstances = state.instances.length;
  let totalGroups = 0, activeUplinks = 0, inactiveUplinks = 0;
  for (const inst of state.instances) {
    for (const g of inst.groups || []) {
      totalGroups += 1;
      for (const u of g.uplinks || []) {
        if (isActive(u)) activeUplinks += 1; else inactiveUplinks += 1;
      }
    }
  }
  return { totalInstances, healthyInstances, totalGroups, activeUplinks, inactiveUplinks };
}
function statusTone(ok, groups) {
  if (!ok) return "bad";
  const uplinks = groups.flatMap(g => g.uplinks || []);
  if (uplinks.length === 0) return "warn";
  const healthyCount = uplinks.filter(healthy).length;
  const activeCount = uplinks.filter(isActive).length;
  if (healthyCount === uplinks.length && activeCount > 0) return "good";
  if (healthyCount > 0) return "warn";
  return "bad";
}
function statusLabel(tone) { return tone === "good" ? "Healthy" : tone === "warn" ? "Degraded" : "Offline"; }
function prettyMode(value) {
  const v = String(value || "").toLowerCase();
  if (v === "active_passive") return "Active / Passive";
  if (v === "active_active") return "Active / Active";
  return value || "—";
}
function prettyScope(value) {
  const v = String(value || "").toLowerCase();
  if (v === "global") return "Global";
  if (v === "per_uplink") return "Per uplink";
  if (v === "per_flow") return "Per flow";
  return value || "—";
}
function groupConfigChips(group) {
  const mode = prettyMode(group.load_balancing_mode);
  const scope = prettyScope(group.routing_scope);
  const failback = group.auto_failback;
  const fbCls = failback ? "fb-on" : "fb-off";
  const fbLabel = failback ? "On" : "Off";
  return `
    <span class="cfg-chip mode" title="load_balancing_mode"><span>⚖</span><span class="cfg-key">Mode:</span><span>${escapeHtml(mode)}</span></span>
    <span class="cfg-chip scope" title="routing_scope"><span>⌘</span><span class="cfg-key">Scope:</span><span>${escapeHtml(scope)}</span></span>
    <span class="cfg-chip ${fbCls}" title="auto_failback"><span>↺</span><span class="cfg-key">Auto-failback:</span><span>${fbLabel}</span></span>`;
}
function protocolLabel(transport) {
  const v = String(transport || "").toLowerCase();
  if (v === "vless") return "VLESS";
  if (v === "shadowsocks" || v === "ws") return "SS";
  return transport ? String(transport) : "—";
}
function encapsulationLabel(transport) {
  return protocolLabel(transport);
}
function transportLabel(mode) {
  const v = String(mode || "").toLowerCase();
  if (v === "http1") return "WS/H1";
  if (v === "h2") return "WS/H2";
  if (v === "h3") return "WS/H3";
  if (v === "quic") return "QUIC";
  return null;
}
function stackLabel(transport, mode) {
  const enc = encapsulationLabel(transport);
  const t = String(transport || "").toLowerCase();
  if (t === "shadowsocks") return "SS/QUIC";
  const tr = transportLabel(mode);
  if (!tr) return enc;
  return `${enc}/${tr}`;
}
function downgradeTitle(configured, effective, leg) {
  return `${leg} auto-downgraded ${configured.toUpperCase()} → ${effective.toUpperCase()} (H3/QUIC unreachable)`;
}
function legPill(t, cls, leg, configured, effective, downgraded) {
  const dg = downgraded ? " proto-downgraded" : "";
  const star = downgraded ? "<span class=\"proto-dg\">↘</span>" : "";
  const title = downgraded ? downgradeTitle(configured, effective, leg) : `${leg} path`;
  const legTag = leg ? `<span class="proto-leg">${leg}</span>` : "";
  return `<span class="proto-pill ${cls}${dg}" title="${escapeHtml(title)}">${legTag}${escapeHtml(stackLabel(t, effective))}${star}</span>`;
}
function protocolPill(uplink) {
  const t = String(uplink.transport || "").toLowerCase();
  const cls = t === "vless" || t === "shadowsocks" || t === "ws" ? `proto-${t}` : "";
  const tcpMode = uplink.tcp_ws_mode || null;
  const udpMode = uplink.udp_ws_mode || null;
  const tcpEff = uplink.tcp_ws_mode_effective || tcpMode;
  const udpEff = uplink.udp_ws_mode_effective || udpMode;
  const tcpDg = !!uplink.tcp_downgrade_active && tcpMode !== tcpEff;
  const udpDg = !!uplink.udp_downgrade_active && udpMode !== udpEff;
  if (t === "shadowsocks") {
    return `<span class="proto-pill ${cls}" title="encapsulation/transport">${escapeHtml(stackLabel(t))}</span>`;
  }
  if (tcpMode && udpMode && tcpMode === udpMode && tcpEff === udpEff && tcpDg === udpDg) {
    return legPill(t, cls, "", tcpMode, tcpEff, tcpDg);
  }
  const parts = [];
  if (tcpMode) parts.push(legPill(t, cls, "TCP", tcpMode, tcpEff, tcpDg));
  if (udpMode) parts.push(legPill(t, cls, "UDP", udpMode, udpEff, udpDg));
  if (!parts.length) return `<span class="proto-pill ${cls}">${escapeHtml(encapsulationLabel(t))}</span>`;
  return `<div class="proto-stack">${parts.join("")}</div>`;
}
function activeProtocolChip(group) {
  const byName = new Map((group.uplinks || []).map(u => [u.name, u]));
  const candidates = [];
  if (group.global_active_uplink) candidates.push(["Active", group.global_active_uplink]);
  if (group.tcp_active_uplink && group.tcp_active_uplink !== group.global_active_uplink) {
    candidates.push(["TCP", group.tcp_active_uplink]);
  }
  if (group.udp_active_uplink && group.udp_active_uplink !== group.global_active_uplink && group.udp_active_uplink !== group.tcp_active_uplink) {
    candidates.push(["UDP", group.udp_active_uplink]);
  }
  if (!candidates.length) return "";
  return candidates.map(([scope, name]) => {
    const u = byName.get(name);
    if (!u) return "";
    const t = String(u.transport || "").toLowerCase();
    const cls = t === "vless" || t === "shadowsocks" || t === "ws" ? `proto-${t}` : "";
    const isUdp = scope === "UDP";
    const configured = isUdp ? u.udp_ws_mode : u.tcp_ws_mode;
    const effective = (isUdp ? u.udp_ws_mode_effective : u.tcp_ws_mode_effective) || configured;
    const downgraded = !!(isUdp ? u.udp_downgrade_active : u.tcp_downgrade_active) && configured !== effective;
    const dg = downgraded ? " proto-downgraded" : "";
    const star = downgraded ? "<span class=\"proto-dg\">↘</span>" : "";
    const title = downgraded ? downgradeTitle(configured, effective, scope) : "";
    return `<span class="cfg-chip"><span>⇄</span><span class="cfg-key">${scope}:</span><span class="proto-pill ${cls}${dg}" title="${escapeHtml(title)}" style="margin-left:2px">${escapeHtml(stackLabel(t, effective))}${star}</span></span>`;
  }).join("");
}
function uplinkRole(u) {
  const parts = [];
  if (u.active_global) parts.push("global");
  if (u.active_tcp) parts.push("tcp");
  if (u.active_udp) parts.push("udp");
  return parts.length ? parts.join(", ") : "standby";
}
function summaryCards(stats) {
  return [
    { label: "Total Instances", value: stats.totalInstances, icon: "▣", tone: "" },
    { label: "Healthy Instances", value: stats.healthyInstances, icon: "♥", tone: "good" },
    { label: "Total Uplink Groups", value: stats.totalGroups, icon: "◎", tone: "warn" },
    { label: "Active Uplinks", value: stats.activeUplinks, icon: "↗", tone: "good", good: true },
    { label: "Inactive Uplinks", value: stats.inactiveUplinks, icon: "⊘", tone: "muted" },
  ];
}
function renderSummary(stats) {
  const root = document.getElementById("summaryGrid");
  root.innerHTML = summaryCards(stats).map(c => `
    <article class="summary-card">
      <div class="summary-copy">
        <div class="summary-label">${c.label}</div>
        <div class="summary-value ${c.good ? "good" : ""}">${c.value}</div>
      </div>
      <div class="summary-icon ${c.tone}">${c.icon}</div>
    </article>`).join("");
}
function rebuild(raw) {
  state.instances = [];
  state.errors = [];
  for (const inst of raw.instances) {
    if (!inst.ok) {
      state.errors.push(inst.name + ": " + inst.error);
      state.instances.push({ name: inst.name, ok: false, error: inst.error, groups: [] });
      continue;
    }
    const groups = inst.topology?.instance?.groups || [];
    state.instances.push({ name: inst.name, ok: true, error: null, groups });
  }
}
function renderErrors() {
  const box = document.getElementById("errors");
  box.innerHTML = state.errors.map(e => `<div class="error">${escapeHtml(e)}</div>`).join("");
}
function render() {
  renderErrors();
  const stats = computeStats();
  renderSummary(stats);
  const root = document.getElementById("groups");
  root.innerHTML = "";
  for (const instance of state.instances) {
    const panel = document.createElement("article");
    const collapsed = state.collapsedInstances.has(instance.name);
    panel.className = "instance-panel" + (collapsed ? " collapsed" : "");
    const groups = instance.groups || [];
    const tone = statusTone(instance.ok, groups);
    panel.innerHTML = `
      <header class="instance-panel-header">
        <div class="status-dot ${tone}"></div>
        <div class="panel-title">
          <strong>${escapeHtml(instance.name)}</strong>
          <span class="status-pill ${tone}">${statusLabel(tone)}</span>
        </div>
        <span class="collapse-chev">⌃</span>
      </header>`;
    panel.querySelector(".instance-panel-header").addEventListener("click", () => toggleInstance(instance.name));
    if (!instance.ok) {
      const body = document.createElement("div");
      body.className = "instance-panel-body";
      body.innerHTML = `<div class="error">${escapeHtml(instance.error || "instance недоступен")}</div>`;
      panel.appendChild(body);
      root.appendChild(panel);
      continue;
    }
    const body = document.createElement("div");
    body.className = "instance-panel-body";
    body.innerHTML = `<div class="section-title">Uplink Groups</div>`;
    for (const group of groups) {
      const groupEl = document.createElement("section");
      const groupKey = instance.name + "\u0000" + group.name;
      const groupCollapsed = state.collapsedGroups.has(groupKey);
      const activeInGroup = (group.uplinks || []).filter(isActive).length;
      const activeProtoChip = activeProtocolChip(group);
      groupEl.className = "group-table" + (groupCollapsed ? " collapsed" : "");
      groupEl.innerHTML = `
        <div class="group-table-head">
          <div class="group-table-title">
            <span>${escapeHtml(group.name)}</span>
            <span class="group-count">${(group.uplinks || []).length} uplinks</span>
          </div>
          <div class="group-table-meta">
            <div class="cfg-chips">${groupConfigChips(group)}${activeProtoChip}</div>
            <span class="cfg-active">${activeInGroup} active</span>
            <span class="collapse-chev">⌃</span>
          </div>
        </div>
        <div class="rows">
          <div class="rows-head">
            <div>Uplink</div>
            <div>Protocol</div>
            <div>Status</div>
            <div>TCP</div>
            <div>UDP</div>
            <div>Role</div>
            <div>Action</div>
          </div>
        </div>`;
      groupEl.querySelector(".group-table-head").addEventListener("click", () => toggleGroup(groupKey));
      const rows = groupEl.querySelector(".rows");
      for (const uplink of group.uplinks || []) {
        const entry = { instance: instance.name, group: group.name, uplink };
        const rowTone = isActive(uplink) ? "good" : (healthy(uplink) ? "warn" : "bad");
        const label = rowTone === "good" ? "Active" : rowTone === "warn" ? "Ready" : "Inactive";
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
          <div class="uplink-cell"><span class="status-dot ${rowTone}"></span><span>${escapeHtml(uplink.name)}</span></div>
          <div>${protocolPill(uplink)}</div>
          <div><span class="status-pill ${rowTone}">${label}</span></div>
          <div class="${uplink.tcp_healthy === false ? "muted-cell" : ""}">${uplink.tcp_healthy === false ? "down" : "ok"}</div>
          <div class="${uplink.udp_healthy === false ? "muted-cell" : ""}">${uplink.udp_healthy === false ? "down" : "ok"}</div>
          <div class="muted-cell">${escapeHtml(uplinkRole(uplink))}</div>
          <div>${rowTone === "good" ? `<button class="action-btn" type="button" disabled>Active</button>` : `<button class="action-btn primary" type="button">▶ Activate</button>`}</div>`;
        if (rowTone !== "good") {
          row.querySelector("button").addEventListener("click", ev => { ev.stopPropagation(); activateEntries([entry]); });
        }
        rows.appendChild(row);
      }
      body.appendChild(groupEl);
    }
    panel.appendChild(body);
    root.appendChild(panel);
  }
  const now = new Date().toLocaleTimeString();
  document.getElementById("updatedAtInline").textContent = now;
  renderRefreshButton();
}
function renderRefreshButton() {
  const btn = document.getElementById("refreshBtn");
  const label = document.getElementById("refreshLabel");
  btn.classList.toggle("off", !autoRefreshEnabled);
  btn.setAttribute("aria-pressed", String(autoRefreshEnabled));
  label.textContent = autoRefreshEnabled ? "Auto" : "Paused";
}
function stopAutoRefresh() { if (timer !== null) { clearInterval(timer); timer = null; } }
function startAutoRefresh() {
  stopAutoRefresh();
  if (!autoRefreshEnabled) return;
  timer = setInterval(() => load().catch(err => { state.errors = [String(err)]; render(); }), refreshMs);
}
function toggleAutoRefresh() {
  autoRefreshEnabled = !autoRefreshEnabled;
  renderRefreshButton();
  startAutoRefresh();
}
function toggleInstance(name) {
  if (state.collapsedInstances.has(name)) state.collapsedInstances.delete(name);
  else state.collapsedInstances.add(name);
  render();
}
function toggleGroup(key) {
  if (state.collapsedGroups.has(key)) state.collapsedGroups.delete(key);
  else state.collapsedGroups.add(key);
  render();
}
async function load() {
  const res = await fetch("/dashboard/api/topology", { cache: "no-store" });
  const raw = await res.json();
  rebuild(raw);
  render();
}
async function activateEntries(entries) {
  const targets = entries.map(e => ({ instance: e.instance, group: e.group, uplink: e.uplink.name }));
  await fetch("/dashboard/api/activate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ targets, transport: "both" })
  });
  await load();
}
function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[c]));
}
function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  const icon = document.getElementById("themeIcon");
  if (icon) icon.textContent = theme === "dark" ? "☀" : "☾";
  const meta = document.getElementById("themeColorMeta");
  if (meta) {
    const navColor = getComputedStyle(document.documentElement).getPropertyValue("--nav").trim();
    if (navColor) meta.setAttribute("content", navColor);
  }
  try { localStorage.setItem("dashboard-theme", theme); } catch (_) {}
}
(function initTheme() {
  let saved = null;
  try { saved = localStorage.getItem("dashboard-theme"); } catch (_) {}
  const prefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
  applyTheme(saved || (prefersLight ? "light" : "dark"));
})();
document.getElementById("themeToggle").addEventListener("click", () => {
  const cur = document.documentElement.getAttribute("data-theme") || "dark";
  applyTheme(cur === "dark" ? "light" : "dark");
});
document.getElementById("refreshBtn").addEventListener("click", toggleAutoRefresh);
renderRefreshButton();
load().catch(err => { state.errors = [String(err)]; render(); });
startAutoRefresh();
</script>
</body>
